[templestay]
deployment_id = "templestay"
preset = "minimal"
hooks_required = false
hooks_enabled = false
mcp_profile = "none"
state_machine = "Input → Atomize → Plan → Execute → Verify → Critique → Report"
verify_repair_edge = "Verify → Execute"
repair_edge = "Critique → Atomize → Plan"

[codex]
preserve_model = true
model_reasoning_effort = "low"
model_verbosity = "low"
subagent_fanout = false
model_instructions_file = "AGENTS.md"

[codex.features]
memories = false
